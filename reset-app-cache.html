<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Cache</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; padding: 2rem; text-align: center; }
      button { padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 8px; border: none; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Reset Cache</h1>
    <p>If you're seeing an out-of-date version of this app, click the button below to clear cached assets.</p>
    <button id="reset-btn">Reset</button>
    <script>
      document.getElementById('reset-btn').addEventListener('click', () => {
        caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))).then(() => {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(reg => reg.unregister()))).then(() => {
              alert('Cache cleared. You can now close this page and reload the app.');
            });
          } else {
            alert('Cache cleared.');
          }
        });
      });
    </script>
  </body>
</html>
