<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset InvoiceMate Cache</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #f7f7f4;
      color: #111;
    }
    main {
      max-width: 440px;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: -0.05em;
    }
    p {
      color: #707070;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Refreshing InvoiceMate</h1>
    <p>Old app files are being cleared. Your invoice data is not removed.</p>
  </main>
  <script>
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } finally {
        location.href = "./index.html?v=0.3.0";
      }
    })();
  </script>
</body>
</html>
