<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset InvoiceMate Cache</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f1f5f9; color: #0f172a; }
      main { width: min(92vw, 460px); padding: 24px; border-radius: 24px; background: #fff; box-shadow: 0 20px 45px rgba(15,23,42,.08); }
      h1 { margin: 0 0 8px; }
      p { color: #64748b; line-height: 1.45; }
      a, button { display: inline-block; margin-top: 16px; border: 0; border-radius: 999px; padding: 12px 18px; color: #fff; background: #2563eb; text-decoration: none; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <h1>Resetting app cache…</h1>
      <p>This clears only the app shell cache and old service worker. It does not clear saved invoice data.</p>
      <a id="openApp" href="./index.html?v=0.1.5">Open InvoiceMate</a>
    </main>
    <script>
      async function resetAppCache() {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (error) {
          console.info('Cache reset skipped:', error);
        }
        window.location.replace('./index.html?v=0.1.5');
      }
      resetAppCache();
    </script>
  </body>
</html>
